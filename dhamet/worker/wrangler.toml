name = "dhamet-api"
main = "src/index.js"
compatibility_date = "2026-07-01"
workers_dev = false

# Worker route. Static files stay on Cloudflare Pages; this Worker handles Dhamet API only.
routes = [
  { pattern = "ouglsoft.com/dhamet/api/*", zone_name = "ouglsoft.com" }
]

[[d1_databases]]
binding = "DB"
database_name = "dhamet2_test"
database_id = "3f957678-fd6c-4164-8302-f5fa4b8acf16"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "TRAINING_BUCKET"
bucket_name = "dhamet-training-private"

[[durable_objects.bindings]]
name = "REALTIME"
class_name = "RealtimeObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeObject"]

[vars]
PUBLIC_BASE_PATH = "/dhamet"
APP_ORIGIN = "https://ouglsoft.com/dhamet"
RESEND_FROM_EMAIL = "Dhamet <noreply@ouglsoft.com>"
EXPRESS_TURN_HOST = "relay1.expressturn.com:3478"
TURN_TTL_SECONDS = "3600"

# Required secrets; set them from Cloudflare Dashboard as Worker Secrets:
# RESEND_API_KEY
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# INTERNAL_API_SECRET (any long random string; also used for internal writes)
# Optional ExpressTURN secrets. Prefer EXPRESS_TURN_SECRET for time-limited credentials.
# EXPRESS_TURN_SECRET
# EXPRESS_TURN_USERNAME
# EXPRESS_TURN_CREDENTIAL
# Optional comma-separated TURN URLs override:
# EXPRESS_TURN_URLS
