<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
<meta name="dhamet-build" content="__DHAMET_BUILD__">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />

  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://ouglsoft.com/dhamet/pages/loby.html" />

  <title data-i18n="lobby.title">قائمة الغرف واللاعبين المتصلين</title>
    <link rel="icon" type="image/webp" href="../assets/icons/icon.webp" />
<script src="../js/theme-colors.js?v=__DHAMET_BUILD__"></script>
<script src="../js/app-runtime.js?v=__DHAMET_BUILD__"></script>

<link rel="stylesheet" href="../css/style.css?v=__DHAMET_BUILD__" />
  <link rel="stylesheet" href="../css/pages.css?v=__DHAMET_BUILD__" />
        <script src="../js/auth-runtime.js?v=__DHAMET_BUILD__"></script>
    <script src="../js/account-runtime.js?v=__DHAMET_BUILD__"></script>
  <script src="../shared/dhamet-utils.js?v=__DHAMET_BUILD__"></script>
<script src="../shared/dhamet-lobby.js?v=__DHAMET_BUILD__"></script>
    <script src="../shared/dhamet-spectators.js?v=__DHAMET_BUILD__"></script>
  <script src="../shared/dhamet-presence.js?v=__DHAMET_BUILD__"></script>
<script src="../shared/dhamet-live.js?v=__DHAMET_BUILD__"></script>
  <script src="../js/online/game-room-client.js?v=__DHAMET_BUILD__"></script>
  <script src="../js/online/app-live-client.js?v=__DHAMET_BUILD__"></script>

  <script src="../js/i18n.js?v=__DHAMET_BUILD__"></script>
<script src="../js/modal.js?v=__DHAMET_BUILD__"></script>
    <script src="../js/leaderboard.js?v=__DHAMET_BUILD__"></script>
  <script src="../js/online/lobby-runtime.js?v=__DHAMET_BUILD__"></script>
  <script src="../js/online/online-runtime.js?v=__DHAMET_BUILD__"></script>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-3511LJEQ1R"></script>

<link rel="stylesheet" href="../css/mobile.css?v=__DHAMET_BUILD__" />
<link rel="stylesheet" href="../css/theme.css?v=__DHAMET_BUILD__" />
</head>
<body>
  <main class="z-page z-lobby-page z-vcenter">
    <div class="z-page-inner z-lobby-inner">
      <div class="z-lobby-head">
        <div class="z-lobby-head-left" aria-hidden="true"></div>
<div class="z-lobby-head-center">
          <h1 class="z-page-title" data-i18n="lobby.title">قائمة الغرف واللاعبين المتصلين</h1>
          <p class="z-lobby-subtitle" data-i18n="lobby.subtitle">شاهد المباريات الجارية أو اختر لاعبًا متصلًا وادعه إلى مباراة مباشرة.</p>
        </div>

        <div class="z-lobby-head-right" aria-hidden="true"></div>
      </div>

      <div class="z-lobby-cols">
        <section class="z-lobby-panel" data-i18n-aria-label="aria.lobbyRooms">
          <h2 class="z-lobby-h2" data-i18n="lobby.rooms">قائمة الغرف النشطة</h2>
          <div id="roomsList" class="z-lobby-list rooms">
            <div class="z-empty z-loading" data-i18n="lobby.loadingRooms">جاري تحميل قائمة الغرف المباشرة...</div>
          </div>
        </section>

        <section class="z-lobby-panel" data-i18n-aria-label="aria.lobbyPlayers">
          <h2 class="z-lobby-h2" data-i18n="online.playersTitle">قائمة اللاعبين المتصلين</h2>
          <div id="playersList" class="z-lobby-list players">
            <div class="z-empty z-loading" data-i18n="lobby.loadingPlayers">جاري تحميل قائمة اللاعبين المتصلين.....</div>
          </div>
        </section>
      </div>

      <div class="z-lobby-bottom">
        <button id="btnShowLeaderboardLobby" class="btn secondary z-dash-leaderboard-btn" type="button" data-open-leaderboard="1" data-i18n="dashboard.showLeaderboard">عرض الترتيب العام</button>
        <div id="lobbyInviteControls" class="z-lobby-invite-controls">
          <div id="inviteReceiveToggleRow" class="z-invite-receive-row" data-online-invite-toggle="1">
            <span class="z-invite-receive-label" data-i18n="online.invites.receiveLabel">استقبال الدعوات:</span>
            <button id="btnInviteReceiveToggle" class="z-invite-receive-toggle" type="button" aria-pressed="true">
              <span data-invite-toggle-state data-i18n="online.invites.enabled">مفعل</span>
            </button>
          </div>
          <button id="btnLobbyManualRefresh" class="z-lobby-refresh-btn" type="button" data-i18n-title="lobby.refresh" data-i18n-aria-label="lobby.refresh" title="تحديث اللوبي" aria-label="تحديث اللوبي">
            <img class="btn-ico" src="../assets/icons/refresh.svg" alt="" aria-hidden="true" />
            <span class="z-lobby-refresh-text" data-i18n="buttons.sync">تحديث</span>
          </button>
        </div>
        <a class="btn small primary z-lobby-back" href="./mode.html">
          <img class="btn-ico" src="../assets/icons/chevron-left.svg" alt="" aria-hidden="true" />
          <span data-i18n="lobby.backToMode">العودة إلى اختيار نمط اللعب</span>
        </a>
      </div>
    </div>
  </main>

  <div id="zModalRoot" style="display:none"></div>
<script src="../js/mobile.js?v=__DHAMET_BUILD__"></script>
</body>
</html>
