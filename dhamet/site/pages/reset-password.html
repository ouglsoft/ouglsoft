<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>تعيين كلمة مرور جديدة - ظامت</title>
  <link rel="icon" type="image/webp" href="../assets/icons/icon.webp" />
  <link href="../css/style.css?v=v1.0.2-pulse-optimized" rel="stylesheet" />
  <link href="../css/pages.css?v=v1.0.2-pulse-optimized" rel="stylesheet" />
  <link href="../css/auth.css?v=v1.0.2-pulse-optimized" rel="stylesheet" />
</head>
<body class="z-auth-page z-reset-page">
  <main class="z-reset-shell" id="resetPasswordRoot">
    <section class="z-reset-card" aria-labelledby="resetTitle">
      <div class="z-reset-brand">
        <img alt="" aria-hidden="true" src="../assets/icons/icon.webp" />
        <div>
          <p>لعبة ظامت الموريتانية</p>
          <h1 id="resetTitle">تعيين كلمة مرور جديدة</h1>
        </div>
      </div>

      <p class="z-reset-help">أدخل كلمة مرور جديدة لحسابك. بعد نجاح العملية ارجع إلى تسجيل الدخول واستخدم الكلمة الجديدة.</p>
      <div class="z-auth-msg" id="resetMsg" role="status" aria-live="polite"></div>

      <form class="z-reset-form" autocomplete="off" onsubmit="return false;">
        <label class="z-reset-field" for="resetPass1">
          <span>كلمة المرور الجديدة</span>
          <div class="z-reset-input-wrap">
            <input autocomplete="new-password" id="resetPass1" minlength="6" placeholder="اكتب كلمة المرور الجديدة" type="password" />
            <button class="btn secondary z-reset-toggle" id="toggleResetPass1" type="button">إظهار</button>
          </div>
        </label>

        <label class="z-reset-field" for="resetPass2">
          <span>تأكيد كلمة المرور</span>
          <div class="z-reset-input-wrap">
            <input autocomplete="new-password" id="resetPass2" minlength="6" placeholder="أعد كتابة كلمة المرور" type="password" />
            <button class="btn secondary z-reset-toggle" id="toggleResetPass2" type="button">إظهار</button>
          </div>
        </label>

        <div class="z-reset-actions">
          <button class="btn primary" id="btnApplyReset" type="button">تحديث كلمة المرور</button>
          <a class="btn secondary" href="../index.html">العودة إلى تسجيل الدخول</a>
        </div>
      </form>
    </section>
  </main>
  <script src="../js/reset-password.js?v=v1.0.2-pulse-optimized"></script>
</body>
</html>
