name: Train private Dhamet model

on:
  workflow_dispatch:
    inputs:
      force_test_run:
        description: "Run a private test below the normal data threshold (never promotes the model)"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "37 2 * * 0"

permissions:
  contents: read

concurrency:
  group: train-private-dhamet-model
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: training/requirements.txt
      - name: Install training dependencies
        run: python -m pip install --requirement training/requirements.txt
      - name: Train, validate, and promote privately
        working-directory: training/src
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          TRAINING_MAX_GAMES: "20000"
          TRAINING_EPOCHS: "4"
          TRAINING_BATCH_SIZE: "128"
        run: |
          EXTRA=""
          if [ "${{ inputs.force_test_run || false }}" = "true" ]; then EXTRA="--force"; fi
          python train.py $EXTRA
