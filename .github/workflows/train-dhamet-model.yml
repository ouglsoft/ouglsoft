name: Train private Dhamet model

on:
  workflow_dispatch:
  schedule:
    - cron: "37 2 * * *"

permissions:
  contents: read

concurrency:
  group: train-private-dhamet-model
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          path: app

      - name: Check whether saved training records exist
        id: precheck
        env:
          TRAINING_EXPORT_URL: "https://ouglsoft.com/dhamet/api/internal/training/export"
          TRAINING_EXPORT_SECRET: ${{ secrets.TRAINING_EXPORT_SECRET }}
        run: python3 app/training/src/check_data.py

      - name: Checkout private model store
        if: steps.precheck.outputs.run_training == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.TRAINING_MODEL_REPOSITORY }}
          token: ${{ secrets.TRAINING_MODEL_TOKEN }}
          path: private-model-store
          fetch-depth: 1

      - uses: actions/setup-python@v5
        if: steps.precheck.outputs.run_training == 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/training/requirements.txt

      - name: Install training dependencies
        if: steps.precheck.outputs.run_training == 'true'
        run: python -m pip install --requirement app/training/requirements.txt

      - name: Train and prepare one-time consumption receipt
        id: training
        if: steps.precheck.outputs.run_training == 'true'
        env:
          TRAINING_EXPORT_URL: "https://ouglsoft.com/dhamet/api/internal/training/export"
          TRAINING_EXPORT_SECRET: ${{ secrets.TRAINING_EXPORT_SECRET }}
          TRAINING_MAX_GAMES: "5000"
          TRAINING_EPOCHS: "1"
          TRAINING_BATCH_SIZE: "128"
          TRAINING_CPU_THREADS: "2"
          OMP_NUM_THREADS: "2"
          MKL_NUM_THREADS: "2"
        run: |
          python app/training/src/train.py \
            --model-store private-model-store \
            --receipt app/training-consume-receipt.json

      - name: Replace private model snapshot
        if: steps.training.outputs.model_changed == 'true'
        working-directory: private-model-store
        run: |
          git config user.name "dhamet-training-bot"
          git config user.email "dhamet-training-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Training reported a model change but no files changed." >&2
            exit 1
          fi
          TREE=$(git write-tree)
          COMMIT=$(printf 'Update private Dhamet model snapshot\n' | git commit-tree "$TREE")
          git push origin "$COMMIT:refs/heads/main" --force

      - name: Delete records consumed by the completed training run
        if: steps.training.outputs.consume_ready == 'true'
        env:
          TRAINING_EXPORT_URL: "https://ouglsoft.com/dhamet/api/internal/training/export"
          TRAINING_EXPORT_SECRET: ${{ secrets.TRAINING_EXPORT_SECRET }}
        run: python3 app/training/src/consume_data.py --receipt app/training-consume-receipt.json
