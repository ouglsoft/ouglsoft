name: Train private Dhamet model

on:
  workflow_dispatch:
    inputs:
      force_test_run:
        description: "Run a private test below the normal data threshold (never promotes the model)"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "37 2 * * 0"

permissions:
  contents: read

concurrency:
  group: train-private-dhamet-model
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout application
        uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout private model store
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.TRAINING_MODEL_REPOSITORY }}
          token: ${{ secrets.TRAINING_MODEL_TOKEN }}
          path: private-model-store
          fetch-depth: 1

      - name: Check whether training is needed
        id: precheck
        env:
          TRAINING_EXPORT_URL: "https://ouglsoft.com/dhamet/api/internal/training/export"
          TRAINING_EXPORT_SECRET: ${{ secrets.TRAINING_EXPORT_SECRET }}
        run: |
          EXTRA=""
          if [ "${{ inputs.force_test_run || false }}" = "true" ]; then EXTRA="--force"; fi
          python3 app/training/src/check_data.py --model-store private-model-store $EXTRA

      - uses: actions/setup-python@v5
        if: steps.precheck.outputs.run_training == 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/training/requirements.txt

      - name: Install training dependencies
        if: steps.precheck.outputs.run_training == 'true'
        run: python -m pip install --requirement app/training/requirements.txt

      - name: Train, validate, and promote privately
        if: steps.precheck.outputs.run_training == 'true'
        env:
          TRAINING_EXPORT_URL: "https://ouglsoft.com/dhamet/api/internal/training/export"
          TRAINING_EXPORT_SECRET: ${{ secrets.TRAINING_EXPORT_SECRET }}
          TRAINING_MAX_GAMES: "5000"
          TRAINING_EPOCHS: "4"
          TRAINING_BATCH_SIZE: "128"
        run: |
          EXTRA=""
          if [ "${{ inputs.force_test_run || false }}" = "true" ]; then EXTRA="--force"; fi
          python app/training/src/train.py --model-store private-model-store $EXTRA

      - name: Replace private model snapshot
        if: steps.precheck.outputs.run_training == 'true'
        working-directory: private-model-store
        run: |
          git config user.name "dhamet-training-bot"
          git config user.email "dhamet-training-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No accepted model change to store."
            exit 0
          fi
          TREE=$(git write-tree)
          COMMIT=$(printf 'Update private Dhamet model snapshot\n' | git commit-tree "$TREE")
          git push origin "$COMMIT:refs/heads/main" --force
