name: Deploy Dhamet Worker

on:
  push:
    branches:
      - main
    paths:
      - "dhamet/worker/**"
      - "dhamet/shared/**"
      - "deploy/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-dhamet-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dhamet-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deployment dependency
        run: npm ci

      - name: Apply migrations and deploy Worker
        run: npm run deploy:worker
