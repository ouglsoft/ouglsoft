name: Deploy Dhamet Worker

on:
  push:
    branches: [main]
    paths:
      - "dhamet/worker/**"
      - "dhamet/shared/**"
      - "deploy/deploy-worker.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dhamet-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy Dhamet API Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Deploy Worker
        run: npm run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME }}
