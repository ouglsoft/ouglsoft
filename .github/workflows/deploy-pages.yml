name: Deploy OuglSoft Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "functions/**"
      - "dhamet/site/**"
      - "dhamet/shared/**"
      - "deploy/prepare-pages.mjs"
      - "deploy/deploy-pages.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ouglsoft-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Deploy main site with Dhamet pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Deploy Pages
        run: npm run deploy:pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
